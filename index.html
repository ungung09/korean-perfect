<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관용표현 마스터 RPG</title>
    <style>
        /* 픽셀 폰트 로드 */
        @import url('https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css');

        :root {
            --bg-color: #2c3e50;
            --container-bg: #ecf0f1;
            --primary: #3498db;
            --primary-dark: #2980b9;
            --accent: #e74c3c;
            --text-dark: #2c3e50;
            --border: 4px solid #34495e;
            --btn-bg: #bdc3c7;
            --btn-hover: #95a5a6;
            --hp-green: #2ecc71;
            --hp-red: #e74c3c;
        }

        * {
            box-sizing: border-box;
            font-family: 'NeoDunggeunmo', 'DungGeunMo', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            background: var(--container-bg);
            border: var(--border);
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            min-height: 750px;
            display: flex;
            flex-direction: column;
        }

        /* 씬(화면) 관리 */
        .scene {
            display: none;
            flex-direction: column;
            padding: 20px;
            flex-grow: 1;
            animation: fadeIn 0.5s;
        }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 공통 헤더 */
        #top-bar {
            background: #34495e;
            color: white;
            padding: 10px 15px;
            display: none;
            flex-direction: column;
            gap: 8px;
            border-bottom: var(--border);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }

        .progress-container {
            width: 100%; height: 12px;
            background: #2c3e50;
            border: 2px solid #7f8c8d;
            border-radius: 6px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%; width: 0%;
            background: #f1c40f;
            transition: width 0.3s ease-out;
        }

        /* 인벤토리 & 버프 영역 */
        #inventory-area {
            display: flex; flex-direction: column; align-items: center; width: 100%;
        }
        #inventory { display: flex; gap: 8px; }
        .item-slot {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; cursor: pointer;
            transition: all 0.2s; position: relative;
        }
        .item-slot:hover {
            background: rgba(255,255,255,0.3); transform: scale(1.1); border-color: #f1c40f;
        }
        .item-hint { font-size: 12px; color: #f1c40f; margin-top: 5px; text-shadow: 1px 1px 0 #000; }
        
        #active-buffs {
            display: flex; gap: 10px; margin-top: 5px; min-height: 20px; font-size: 12px; color: #00ffcc;
        }

        /* 버튼 */
        button {
            background: var(--btn-bg); border: 3px solid #7f8c8d; border-radius: 8px;
            padding: 12px; font-size: 16px; cursor: pointer;
            box-shadow: 0 4px 0 #7f8c8d; transition: all 0.1s;
            color: var(--text-dark); margin-bottom: 10px; word-break: keep-all;
        }
        button:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 #7f8c8d; }
        button.action-btn { background: #f39c12; border-color: #d35400; box-shadow: 0 4px 0 #d35400; color: white; font-weight: bold;}
        button.action-btn:active { box-shadow: 0 0 0 #d35400; }
        button.wrong-btn { background: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b;}
        button.correct-btn { background: #2ecc71; color: white; border-color: #27ae60; box-shadow: 0 4px 0 #27ae60;}
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        /* 로그인 & 랭킹 */
        .title-box { text-align: center; margin-bottom: 20px; margin-top: 20px; }
        .title-box h1 { color: var(--primary-dark); text-shadow: 2px 2px 0 #bdc3c7; font-size: 34px; margin: 0; line-height: 1.2; }
        .login-wrapper { display: flex; gap: 15px; justify-content: center; align-items: stretch; flex-wrap: wrap; }
        .login-form-area, .login-ranking-area {
            flex: 1; min-width: 240px; background: white; border: var(--border); border-radius: 8px; padding: 15px;
        }
        .login-form { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 10px; font-size: 18px; border: 2px solid #bdc3c7; border-radius: 5px; text-align: center; }
        .login-ranking-list { flex-grow: 1; overflow-y: auto; max-height: 150px; font-size: 14px; }
        .ranking-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #bdc3c7; }

        /* 게임 전투 영역 */
        .battle-area {
            flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: var(--border); border-radius: 8px; margin-bottom: 15px; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }
        .battle-ground {
            position: absolute; bottom: 0; width: 100%; height: 30%; background: #27ae60;
            border-top: 4px solid #2ecc71;
        }
        
        /* 캐릭터 디자인 고도화 */
        .character-wrapper { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .character { font-size: 70px; position: relative; transition: all 0.2s; filter: drop-shadow(2px 4px 0px rgba(0,0,0,0.2)); }
        .monster { font-size: 80px; position: relative; transition: all 0.2s; filter: drop-shadow(0 0 10px rgba(231,76,60,0.5)); }
        
        .char-item { position: absolute; font-size: 35px; }
        .item-hat { top: -25px; left: 15px; filter: drop-shadow(1px 1px 0px #000); }
        .item-sword { top: 20px; right: -30px; transform: rotate(45deg); z-index: 2;}
        .item-shield { top: 20px; left: -25px; z-index: 2;}
        .item-armor { top: 40px; left: 15px; font-size: 45px; z-index: -1; }
        .item-wings { top: 10px; left: -40px; font-size: 90px; z-index: -2; opacity: 0.8; }
        .item-wand { top: 10px; right: -40px; font-size: 45px; z-index: 3; }
        .item-apple { top: 50px; left: 30px; font-size: 25px; z-index: 4; }
        .item-bomb { bottom: -10px; right: 20px; font-size: 35px; z-index: 4; }
        .item-coin { top: -40px; right: 0px; font-size: 30px; animation: float 1.5s infinite; }

        /* 상태 이상(버프) 이펙트 */
        .shield-aura {
            position: absolute; width: 120px; height: 120px; top: -10px; left: -25px;
            border-radius: 50%; border: 4px solid rgba(52, 152, 219, 0.6);
            background: radial-gradient(circle, rgba(52,152,219,0.2) 0%, rgba(52,152,219,0) 70%);
            animation: pulseAura 1.5s infinite; z-index: 5; display: none; pointer-events: none;
        }

        /* HP 바 */
        .hp-bar-container {
            width: 100px; height: 12px; background: #2c3e50; border: 2px solid white;
            border-radius: 6px; margin-bottom: 10px; position: relative; z-index: 20;
        }
        .hp-bar { height: 100%; background: var(--hp-green); width: 100%; transition: width 0.3s, background-color 0.3s; }

        /* 애니메이션 */
        @keyframes pulseAura { 0% { transform: scale(0.9); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.5; } }
        @keyframes attackRight { 0% { transform: translateX(0); } 50% { transform: translateX(50px) scale(1.2); } 100% { transform: translateX(0); } }
        @keyframes attackLeft { 0% { transform: translateX(0); } 50% { transform: translateX(-50px) scale(1.2); } 100% { transform: translateX(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); filter: brightness(1); } 25% { transform: translateX(-15px); filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); } 75% { transform: translateX(15px); filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes bossEnrage { 0% { transform: scale(1); filter: drop-shadow(0 0 0 red); } 50% { transform: scale(1.5); filter: drop-shadow(0 0 30px red); } 100% { transform: scale(1.3); filter: drop-shadow(0 0 15px red); } }

        .anim-attack-right { animation: attackRight 0.3s ease; }
        .anim-attack-left { animation: attackLeft 0.3s ease; }
        .anim-shake { animation: shake 0.3s ease; }
        .anim-float { animation: float 2s infinite ease-in-out; }
        .anim-enrage { animation: bossEnrage 1s forwards; }

        /* 문제 영역 */
        .question-box {
            background: white; border: var(--border); border-radius: 8px; padding: 15px;
            text-align: center; font-size: 18px; margin-bottom: 15px; min-height: 80px;
            display: flex; align-items: center; justify-content: center; line-height: 1.4;
            box-shadow: 0 4px 0 #bdc3c7;
        }
        .highlight { color: var(--accent); font-weight: bold; font-size: 20px;}

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* 이펙트 텍스트 */
        .effect-text {
            position: absolute; font-size: 26px; font-weight: bold; color: #ffeb3b;
            text-shadow: 2px 2px 0 #d32f2f, -1px -1px 0 #d32f2f, 1px -1px 0 #d32f2f, -1px 1px 0 #d32f2f;
            pointer-events: none; animation: floatUp 1s forwards; z-index: 100; text-align: center;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-40px) scale(1.3); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }

        /* 보상 팝업 */
        #reward-popup {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(44, 62, 80, 0.95); color: white; padding: 25px;
            border-radius: 12px; border: 4px solid #f1c40f; text-align: center;
            z-index: 200; display: none; box-shadow: 0 0 30px rgba(0,0,0,0.8); width: 80%;
        }
        #reward-popup span { font-size: 70px; display: block; margin-bottom: 10px; animation: float 1s infinite; filter: drop-shadow(0 0 10px gold);}
        #reward-desc { font-size: 14px; color: #bdc3c7; margin-top: 10px; line-height: 1.4;}

        .hidden-option { visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    
    <!-- 상단 상태바 -->
    <div id="top-bar">
        <div class="stats-row">
            <span id="stage-title">Stage 1</span>
            <span id="score-display">점수: 0</span>
            <span id="q-counter">0/30</span>
        </div>
        <div id="inventory-area">
            <div id="inventory">
                <div class="item-slot" id="slot-0" onclick="useItem(0)"></div>
                <div class="item-slot" id="slot-1" onclick="useItem(1)"></div>
                <div class="item-slot" id="slot-2" onclick="useItem(2)"></div>
                <div class="item-slot" id="slot-3" onclick="useItem(3)"></div>
                <div class="item-slot" id="slot-4" onclick="useItem(4)"></div>
            </div>
            <div class="item-hint">아이템을 누르면 특별한 버프가 발동됩니다!</div>
            <div id="active-buffs"></div>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <!-- 로그인 화면 -->
    <div id="scene-login" class="scene active">
        <div class="title-box">
            <h1>관용표현<br>마스터 RPG</h1>
            <p style="font-size: 60px; margin: 15px 0;">🧑‍🎓⚔️🐉</p>
        </div>
        
        <div class="login-wrapper">
            <div class="login-form-area">
                <h3 style="margin-top: 0; text-align: center; color: var(--primary-dark);">게임 참가</h3>
                <div class="login-form">
                    <input type="number" id="input-class" placeholder="몇 반? (숫자)" required>
                    <input type="number" id="input-number" placeholder="몇 번? (숫자)" required>
                    <button class="action-btn" onclick="startGame()">모험 시작!</button>
                </div>
            </div>
            
            <div class="login-ranking-area">
                <h3 style="margin-top: 0; text-align: center; color: var(--accent);">🏆 명예의 전당</h3>
                <div id="login-ranking-list" class="login-ranking-list">
                    <div style="text-align:center; padding: 20px;">랭킹을 불러오는 중...</div>
                </div>
            </div>
        </div>
        <p style="text-align: center; font-size: 12px; color: #7f8c8d; margin-top: 20px;">
            ※ 구글 시트의 1행에는 반드시 제목(헤더)이 있어야 합니다.
        </p>
    </div>

    <!-- 로딩 화면 -->
    <div id="scene-loading" class="scene" style="justify-content: center; align-items: center;">
        <h2 class="anim-float" style="color: var(--primary-dark);">데이터를 마법책에서<br>불러오는 중... 📖</h2>
    </div>

    <!-- 게임 화면 -->
    <div id="scene-game" class="scene">
        <div class="battle-area" id="battle-area">
            <div class="battle-ground"></div>
            
            <!-- Stage 1 뷰 -->
            <div id="stage1-view" style="display:none; width: 100%; height: 100%; justify-content: center; align-items: center; z-index: 10;">
                <div class="character-wrapper">
                    <div class="character anim-float" id="player-char-s1">
                        🧑‍🎓
                        <div id="eq-hat" class="char-item item-hat" style="display:none;">🎓</div>
                        <div id="eq-sword" class="char-item item-sword" style="display:none;">⚔️</div>
                        <div id="eq-shield" class="char-item item-shield" style="display:none;">🛡️</div>
                        <div id="eq-armor" class="char-item item-armor" style="display:none;">💖</div>
                        <div id="eq-wings" class="char-item item-wings" style="display:none;">🧚</div>
                        <div id="eq-wand" class="char-item item-wand" style="display:none;">🪄</div>
                        <div id="eq-apple" class="char-item item-apple" style="display:none;">🍎</div>
                        <div id="eq-bomb" class="char-item item-bomb" style="display:none;">💣</div>
                        <div id="eq-coin" class="char-item item-coin" style="display:none;">🪙</div>
                    </div>
                </div>
            </div>

            <!-- Stage 2, 3 전투 뷰 -->
            <div id="battle-view" style="display:none; width: 100%; height: 100%; justify-content: space-around; align-items: center; z-index: 10;">
                <div class="character-wrapper">
                    <div class="hp-bar-container"><div class="hp-bar" id="player-hp"></div></div>
                    <div class="character anim-float" id="player-char-battle">
                        <div class="shield-aura" id="player-shield-aura"></div>
                        🧑‍🎓
                        <div id="eq-hat-b" class="char-item item-hat" style="display:none;">🎓</div>
                        <div id="eq-sword-b" class="char-item item-sword" style="display:none;">⚔️</div>
                        <div id="eq-shield-b" class="char-item item-shield" style="display:none;">🛡️</div>
                        <div id="eq-armor-b" class="char-item item-armor" style="display:none;">💖</div>
                        <div id="eq-wings-b" class="char-item item-wings" style="display:none;">🧚</div>
                        <div id="eq-wand-b" class="char-item item-wand" style="display:none;">🪄</div>
                        <div id="eq-apple-b" class="char-item item-apple" style="display:none;">🍎</div>
                        <div id="eq-bomb-b" class="char-item item-bomb" style="display:none;">💣</div>
                        <div id="eq-coin-b" class="char-item item-coin" style="display:none;">🪙</div>
                    </div>
                </div>
            </div>

            <!-- Stage 2, 3 전투 뷰 -->
            <div id="battle-view" style="display:none; width: 100%; height: 100%; justify-content: space-around; align-items: center; z-index: 10;">
                <div class="character-wrapper">
                    <div class="hp-bar-container"><div class="hp-bar" id="player-hp"></div></div>
                    <div class="character anim-float" id="player-char-battle">
                        <div class="shield-aura" id="player-shield-aura"></div>
                        🧑‍🎓
                        <div id="eq-hat-b" class="char-item item-hat" style="display:none;">🎓</div>
                        <div id="eq-sword-b" class="char-item item-sword" style="display:none;">⚔️</div>
                        <div id="eq-shield-b" class="char-item item-shield" style="display:none;">🛡️</div>
                        <div id="eq-armor-b" class="char-item item-armor" style="display:none;">💖</div>
                        <div id="eq-wings-b" class="char-item item-wings" style="display:none;">🧚</div>
                    </div>
                </div>
                
                <div style="font-size: 35px; font-weight: bold; color: var(--accent); text-shadow: 2px 2px 0 #fff; z-index: 10;">VS</div>
                
                <div class="character-wrapper">
                    <div class="hp-bar-container"><div class="hp-bar" id="monster-hp"></div></div>
                    <div class="monster anim-float" id="monster-char">👾</div>
                </div>
            </div>
        </div>

        <div class="question-box" id="question-text">문제가 표시됩니다.</div>

        <div class="options-grid" id="options-area">
            <button onclick="checkAnswer(0)"></button>
            <button onclick="checkAnswer(1)"></button>
            <button onclick="checkAnswer(2)"></button>
            <button onclick="checkAnswer(3)"></button>
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="scene-result" class="scene" style="justify-content: center; align-items: center; text-align: center;">
        <h1 id="result-title" style="color: var(--primary-dark); font-size: 40px; margin-bottom: 10px;">스테이지 클리어!</h1>
        <p id="result-desc" style="font-size: 18px; margin-bottom: 40px; line-height: 1.5;"></p>
        <button id="result-btn" class="action-btn" style="width: 80%; padding: 15px; font-size: 20px;" onclick="nextStage()">다음 스테이지</button>
    </div>

    <!-- 보상 팝업 -->
    <div id="reward-popup">
        <span id="reward-icon">🎁</span>
        <h3 id="reward-name" style="margin: 0; color: #f1c40f; font-size: 24px;">아이템 획득!</h3>
        <p id="reward-desc">아이템 설명</p>
    </div>

</div>

<script>
    // ==========================================
    // 앱스 스크립트 웹앱 URL 입력 (배포된 URL)
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzcltoLzFwrPO6xEjntBVAxRWwjg5485xQpvB7hkhm2LH09e5yLOd8KnxcmYBz_jeYqXw/exec"; 

    // 기본 데이터베이스 (Fallback)
    const fallbackData = [
        {id: 1, idiom: "눈이 번쩍 뜨이다", meaning: "정신이 갑자기 든다.", situation: "솔깃한 제안을 보았을 때"},
        {id: 2, idiom: "손발이 맞다", meaning: "마음이나 의견이 서로 맞다.", situation: "협동 게임을 할 때 팀원끼리 호흡이 척척 맞을 때"},
        {id: 3, idiom: "발이 넓다", meaning: "사귀어 아는 사람이 많다.", situation: "전교에 모르는 사람이 없을 때"},
        {id: 4, idiom: "꼬투리를 물고 늘어지다", meaning: "남의 말에서 꼬치꼬치 따지고 들다.", situation: "사소한 말실수 하나를 끝까지 비판할 때"},
        {id: 5, idiom: "김이 식다", meaning: "재미나 의욕이 없어지다.", situation: "기대했던 계획이 취소되었을 때"},
        {id: 6, idiom: "간 떨어지다", meaning: "매우 놀라다.", situation: "무서운 상황에 깜짝 놀랐을 때"},
        {id: 7, idiom: "손이 크다", meaning: "씀씀이가 후하고 크다.", situation: "음식을 만들 때 넉넉하게 챙길 때"},
        {id: 8, idiom: "마음은 굴뚝 같다", meaning: "하고 싶은 생각이 간절하다.", situation: "참여하고 싶지만 규칙 때문에 못해 아쉬울 때"},
        {id: 9, idiom: "날개를 얻은 듯", meaning: "매우 기쁘고 만족스러움.", situation: "자유시간을 얻어 날아갈 듯 기쁠 때"},
        {id: 10, idiom: "귀에 못이 박히다", meaning: "같은 말을 여러 번 반복해서 듣다.", situation: "잔소리를 너무 많이 들었을 때"}
    ];
    // fallbackData 보충 (원활한 플레이를 위해 복사 확장)
    while(fallbackData.length < 40) { fallbackData.push({...fallbackData[Math.floor(Math.random()*10)], id: fallbackData.length+1}); }

    let allWords = [];
    
    // 아이템 정보 및 특성 정의
    const itemsInfo = {
        0: { id: 'hat', icon: '🎓', name: '지혜의 모자', desc: '사용 시: 3문제 동안 획득 점수가 2배가 됩니다!' },
        1: { id: 'sword', icon: '⚔️', name: '용기의 검', desc: '사용 시: 다음 정답 시 몬스터의 체력을 2칸 깎습니다!' },
        2: { id: 'shield', icon: '🛡️', name: '인내의 방패', desc: '사용 시: 2문제 동안 오답을 골라도 내 HP가 깎이지 않습니다!' },
        3: { id: 'armor', icon: '💖', name: '치유의 갑옷', desc: '사용 시: 즉시 내 체력(HP)을 2칸 회복합니다!' },
        4: { id: 'wings', icon: '🧚', name: '요정의 날개', desc: '사용 시: 즉시 현재 문제의 오답 보기 2개를 제거합니다!' },
        5: { id: 'wand', icon: '🪄', name: '마법 지팡이', desc: '사용 시: 즉시 현재 문제를 정답 처리하고 넘어갑니다!' },
        6: { id: 'apple', icon: '🍎', name: '황금 사과', desc: '사용 시: 최대 체력(Max HP)이 1칸 늘어나고 모두 회복됩니다!' },
        7: { id: 'bomb', icon: '💣', name: '마법 폭탄', desc: '사용 시: 즉시 몬스터의 체력을 3칸 깎습니다! (전투 중 사용 가능)' },
        8: { id: 'coin', icon: '🪙', name: '행운의 동전', desc: '사용 시: 즉시 보너스 100점을 획득합니다!' }
    };

    // 게임 상태
    let player = {
        classNum: 0, studentNum: 0, score: 0,
        hp: 5, maxHp: 5,
        items: [], // 인벤토리 (슬롯)
        permanentLooks: [] // 1스테이지에서 영구히 얻은 외형
    };
    
    // 활성화된 버프 관리
    let activeBuffs = {
        scoreDouble: 0, // 남은 턴(문제) 수
        doubleDamage: 0, 
        shield: 0
    };

    let stage = 1;
    let questions = [];
    let currentQ = 0;
    let correctCount = 0;
    let currentOptionsIndices = []; // 날개 아이템을 위해 버튼 인덱스 추적
    
    // 몬스터
    let monster = { hp: 30, maxHp: 30, emoji: '👾' };
    const bosses = ['🧛', '🧌', '🐉'];

    // DOM Elements
    const scenes = {
        login: document.getElementById('scene-login'),
        loading: document.getElementById('scene-loading'),
        game: document.getElementById('scene-game'),
        result: document.getElementById('scene-result')
    };

    // 유틸: 셔플
    function shuffle(array) {
        let cur = array.length, rnd;
        while (cur !== 0) {
            rnd = Math.floor(Math.random() * cur); cur--;
            [array[cur], array[rnd]] = [array[rnd], array[cur]];
        }
        return array;
    }

    // 1. 데이터 로드 (시트 연동)
    async function loadData() {
        if (!GAS_URL) { allWords = [...fallbackData]; return; }
        try {
            const response = await fetch(`${GAS_URL}?action=getWords`);
            const result = await response.json();
            if(result.status === 'success' && result.data.length > 0) { allWords = result.data; } 
            else { allWords = [...fallbackData]; }
        } catch (e) {
            console.error(e); allWords = [...fallbackData];
        }
    }

    // 씬 제어
    function showScene(sceneName) {
        Object.values(scenes).forEach(s => s.classList.remove('active'));
        scenes[sceneName].classList.add('active');
        document.getElementById('top-bar').style.display = (sceneName === 'game') ? 'flex' : 'none';
    }

    async function startGame() {
        const c = document.getElementById('input-class').value;
        const n = document.getElementById('input-number').value;
        if(!c || !n) { alert("반과 번호를 입력해주세요!"); return; }
        player.classNum = c; player.studentNum = n;
        
        showScene('loading');
        await loadData();
        stage = 1; initStage();
    }

    // 2. 스테이지 초기화
    function initStage() {
        questions = shuffle([...allWords]).slice(0, 30);
        currentQ = 0; correctCount = 0;
        
        // 버프 초기화
        activeBuffs = { scoreDouble: 0, doubleDamage: 0, shield: 0 };

        document.getElementById('stage-title').innerText = `Stage ${stage} ${stage===1?'- 훈련':stage===2?'- 실전 전투':'- 보스 레이드'}`;
        
        document.getElementById('stage1-view').style.display = stage === 1 ? 'flex' : 'none';
        document.getElementById('battle-view').style.display = stage > 1 ? 'flex' : 'none';

        if (stage > 1) {
            player.hp = 5; player.maxHp = 5;
            monster.maxHp = 30; monster.hp = 30;
            monster.emoji = stage === 2 ? bosses[0] : bosses[2];
            document.getElementById('monster-char').innerText = monster.emoji;
            updateHPUI();
        }
        
        updateUI();
        showScene('game');
        renderQuestion();
    }

    function splitIdiom(idiom) {
        const words = idiom.split(' ');
        if (words.length >= 2) return [words.slice(0, Math.ceil(words.length/2)).join(' '), words.slice(Math.ceil(words.length/2)).join(' ')];
        return [idiom.substring(0, Math.ceil(idiom.length/2)), idiom.substring(Math.ceil(idiom.length/2))];
    }

    // 3. 문제 렌더링
    function renderQuestion() {
        if (currentQ >= 30) { handleStageClear(); return; }

        const q = questions[currentQ];
        let correctAnswer = "", displayQ = "";

        if (stage === 1) {
            const parts = splitIdiom(q.idiom);
            displayQ = `다음 관용표현을 완성하세요.<br><br><span class="highlight">"${parts[0]} [ ? ]"</span>`;
            correctAnswer = parts[1];
        } else if (stage === 2) {
            displayQ = `다음 뜻을 가진 관용표현은?<br><br><span class="highlight">${q.meaning}</span>`;
            correctAnswer = q.idiom;
        } else {
            displayQ = `다음 상황에 어울리는 관용표현은?<br><br><span class="highlight">${q.situation}</span>`;
            correctAnswer = q.idiom;
        }

        document.getElementById('question-text').innerHTML = displayQ;

        let options = [correctAnswer];
        let wrongPool = shuffle(allWords.filter(w => w.id !== q.id));
        for (let i = 0; i < 3; i++) {
            options.push(stage === 1 ? splitIdiom(wrongPool[i].idiom)[1] : wrongPool[i].idiom);
        }

        options = shuffle(options);
        const btns = document.getElementById('options-area').getElementsByTagName('button');
        currentOptionsIndices = [];
        for (let i = 0; i < 4; i++) {
            btns[i].innerText = options[i];
            btns[i].className = '';
            btns[i].disabled = false;
            btns[i].style.visibility = 'visible'; // 날개 아이템 대비 초기화
            btns[i].dataset.correct = (options[i] === correctAnswer);
            if(!btns[i].dataset.correct) currentOptionsIndices.push(i); // 오답 인덱스 저장
        }

        document.getElementById('q-counter').innerText = `${currentQ + 1}/30`;
        document.getElementById('progress-bar').style.width = `${(currentQ / 30) * 100}%`;
    }

    // 4. 정답 확인 및 전투/버프 처리
    function checkAnswer(btnIndex) {
        const btns = document.getElementById('options-area').getElementsByTagName('button');
        for(let b of btns) b.disabled = true; // 중복 클릭 방지
        
        const btn = btns[btnIndex];
        const isCorrect = (btn.dataset.correct === 'true');

        if (isCorrect) {
            btn.className = 'correct-btn';
            correctCount++;
            
            // 점수 계산 (모자 버프 확인)
            let earnedScore = 10;
            if (activeBuffs.scoreDouble > 0) { earnedScore *= 2; }
            player.score += earnedScore;
            showEffectText(btn, `+${earnedScore}`);
            
            // 아이템 드롭 (스테이지1은 확정, 전투는 확률)
            if (stage === 1 && correctCount % 6 === 0) { grantItem(true); } 
            else if (stage > 1) { grantItem(false); }
            
            // 전투 데미지 처리
            if (stage > 1) {
                document.getElementById('player-char-battle').classList.add('anim-attack-right');
                setTimeout(() => document.getElementById('player-char-battle').classList.remove('anim-attack-right'), 300);
                
                let dmg = 1;
                if (activeBuffs.doubleDamage > 0) { 
                    dmg = 2; 
                    activeBuffs.doubleDamage = 0; // 검 버프 소모
                    showEffectText(document.getElementById('monster-char'), "크리티컬!");
                }
                monster.hp = Math.max(0, monster.hp - dmg);
                document.getElementById('monster-char').classList.add('anim-shake');
                setTimeout(() => document.getElementById('monster-char').classList.remove('anim-shake'), 300);
            }

        } else {
            btn.className = 'wrong-btn';
            
            // 오답 시 정답을 초록색으로 표시
            for(let b of btns) { if(b.dataset.correct === 'true') b.className = 'correct-btn'; }

            if (stage > 1) {
                document.getElementById('monster-char').classList.add('anim-attack-left');
                setTimeout(() => document.getElementById('monster-char').classList.remove('anim-attack-left'), 300);
                
                // 방패 버프 확인
                if (activeBuffs.shield > 0) {
                    showEffectText(document.getElementById('player-char-battle'), "방어 성공!");
                } else {
                    player.hp--;
                    document.getElementById('player-char-battle').classList.add('anim-shake');
                    setTimeout(() => document.getElementById('player-char-battle').classList.remove('anim-shake'), 300);
                }
            }
        }

        // 턴(문제) 경과에 따른 버프 차감
        if (activeBuffs.scoreDouble > 0) activeBuffs.scoreDouble--;
        if (activeBuffs.shield > 0) activeBuffs.shield--;

        updateUI();
        
        if (player.hp <= 0 && stage > 1) {
            setTimeout(handleGameOver, 1000);
        } else {
            currentQ++;
            setTimeout(renderQuestion, 1200);
        }
    }

    // 5. 아이템 드롭
    function grantItem(isDeterministic = false) {
        if (player.items.length >= 5) return;
        
        // 20% 확률로 아이템 드롭
        if (isDeterministic || Math.random() < 0.2) {
            const randomId = Math.floor(Math.random() * 9); // 아이템 종류 9개로 확장
            player.items.push(randomId);
            
            // 스테이지 1에서는 영구 외형 획득
            if (stage === 1 && !player.permanentLooks.includes(randomId)) {
                player.permanentLooks.push(randomId);
            }
            
            const item = itemsInfo[randomId];
            const popup = document.getElementById('reward-popup');
            document.getElementById('reward-icon').innerText = item.icon;
            document.getElementById('reward-name').innerText = `${item.name} 획득!`;
            document.getElementById('reward-desc').innerText = item.desc;
            
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 2500);
            updateUI();
        }
    }

    // 6. 아이템 사용 (버프 발동)
    function useItem(slotIndex) {
        if (slotIndex >= player.items.length) return;
        
        const itemId = player.items[slotIndex];
        const item = itemsInfo[itemId];
        const charEl = document.getElementById(stage === 1 ? 'player-char-s1' : 'player-char-battle');
        
        // 폭탄(7번)은 Stage 1에서 사용 불가 처리
        if (itemId === 7 && stage === 1) {
            showEffectText(charEl, "전투 중에만 사용 가능!");
            return;
        }

        // 버프 로직
        switch(itemId) {
            case 0: // 모자 (점수 2배, 3문제)
                activeBuffs.scoreDouble = 3;
                showEffectText(charEl, "지혜 상승! (3문제)");
                break;
            case 1: // 검 (다음 데미지 2배)
                activeBuffs.doubleDamage = 1;
                showEffectText(charEl, "공격력 강화!");
                break;
            case 2: // 방패 (무적, 2문제)
                activeBuffs.shield = 2;
                showEffectText(charEl, "보호막 전개! (2문제)");
                break;
            case 3: // 갑옷 (즉시 회복)
                if (stage > 1) {
                    player.hp = Math.min(player.maxHp, player.hp + 2);
                    updateHPUI();
                    showEffectText(charEl, "HP 회복!");
                } else {
                    showEffectText(charEl, "체력이 든든해졌다!"); // 스테이지1은 HP가 안보이므로 텍스트만
                }
                break;
            case 4: // 날개 (즉시 오답 2개 제거)
                if (currentOptionsIndices.length >= 2) {
                    const btns = document.getElementById('options-area').getElementsByTagName('button');
                    // 오답 3개 중 랜덤으로 2개 숨김
                    let toHide = shuffle([...currentOptionsIndices]).slice(0, 2);
                    toHide.forEach(idx => {
                        btns[idx].style.visibility = 'hidden';
                    });
                    showEffectText(charEl, "매직 힌트!");
                } else {
                    showEffectText(charEl, "이미 정답이 보입니다!");
                }
                break;
            case 5: // 마법 지팡이 (즉시 정답)
                const btns = document.getElementById('options-area').getElementsByTagName('button');
                for(let i=0; i<4; i++) {
                    if(btns[i].dataset.correct === 'true') {
                        showEffectText(charEl, "마법 지팡이 발동!");
                        checkAnswer(i);
                        break;
                    }
                }
                break;
            case 6: // 황금 사과 (최대 HP 증가 및 풀피)
                player.maxHp++;
                player.hp = player.maxHp;
                if (stage > 1) updateHPUI();
                showEffectText(charEl, "최대 체력 증가!");
                break;
            case 7: // 마법 폭탄 (몬스터 HP 3 감소)
                if (stage > 1) {
                    monster.hp = Math.max(0, monster.hp - 3);
                    document.getElementById('monster-char').classList.add('anim-shake');
                    updateHPUI();
                    showEffectText(document.getElementById('monster-char'), "폭탄 펑! (-3)");
                }
                break;
            case 8: // 행운의 동전 (즉시 100점)
                player.score += 100;
                showEffectText(charEl, "+100점 획득!");
                break;
        }
        
        // 아이템 소모
        player.items.splice(slotIndex, 1);
        updateUI();
    }

    // 7. UI 전반 업데이트
    function updateUI() {
        document.getElementById('score-display').innerText = `점수: ${player.score}`;
        
        // 인벤토리 아이콘 업데이트
        for(let i=0; i<5; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if (i < player.items.length) {
                slot.innerText = itemsInfo[player.items[i]].icon;
            } else {
                slot.innerText = '';
            }
        }

        // 버프 텍스트 상태 업데이트
        let buffTexts = [];
        if(activeBuffs.scoreDouble > 0) buffTexts.push(`🎓점수2배(${activeBuffs.scoreDouble})`);
        if(activeBuffs.doubleDamage > 0) buffTexts.push(`⚔️강공격(대기)`);
        if(activeBuffs.shield > 0) buffTexts.push(`🛡️보호막(${activeBuffs.shield})`);
        document.getElementById('active-buffs').innerText = buffTexts.join(' | ');

        // 보호막 시각 이펙트
        const shieldAura = document.getElementById('player-shield-aura');
        if (shieldAura) shieldAura.style.display = activeBuffs.shield > 0 ? 'block' : 'none';

        // 영구 장착 외형 업데이트 (Stage 1에서 얻은 것들)
        const chars = ['s1', 'battle'];
        chars.forEach(c => {
            Object.values(itemsInfo).forEach(item => {
                const el = document.getElementById(`eq-${item.id}${c === 'battle' ? '-b' : ''}`);
                if (el) el.style.display = 'none'; // 초기화
            });
            player.permanentLooks.forEach(itemId => {
                const item = itemsInfo[itemId];
                const el = document.getElementById(`eq-${item.id}${c === 'battle' ? '-b' : ''}`);
                if (el) el.style.display = 'block';
            });
        });

        if (stage > 1) updateHPUI();
    }

    function updateHPUI() {
        const pBar = document.getElementById('player-hp');
        const mBar = document.getElementById('monster-hp');
        
        pBar.style.width = `${(player.hp / player.maxHp) * 100}%`;
        pBar.style.backgroundColor = (player.hp / player.maxHp) > 0.3 ? 'var(--hp-green)' : 'var(--hp-red)';
        
        mBar.style.width = `${(monster.hp / monster.maxHp) * 100}%`;
        mBar.style.backgroundColor = (monster.hp / monster.maxHp) > 0.3 ? 'var(--hp-green)' : 'var(--hp-red)';
    }

    function showEffectText(el, text) {
        const rect = el.getBoundingClientRect();
        const effect = document.createElement('div');
        effect.className = 'effect-text';
        effect.innerText = text;
        effect.style.left = `${rect.left + rect.width/2 - 60}px`;
        effect.style.top = `${rect.top - 20}px`;
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 1000);
    }

    // 8. 게임 오버 및 클리어 처리
    function handleGameOver() {
        const resTitle = document.getElementById('result-title');
        const resDesc = document.getElementById('result-desc');
        const resBtn = document.getElementById('result-btn');

        resTitle.innerText = "전투 불능...";
        resTitle.style.color = "var(--hp-red)";
        resDesc.innerText = "HP가 0이 되었습니다.\n걱정마세요! 문제를 섞어서 다시 도전합니다.";
        resBtn.innerText = "현재 스테이지 다시 시작";
        resBtn.onclick = () => { showScene('game'); initStage(); };

        showScene('result');
    }

    function handleStageClear() {
        const resTitle = document.getElementById('result-title');
        const resDesc = document.getElementById('result-desc');
        const resBtn = document.getElementById('result-btn');
        resTitle.style.color = "var(--primary-dark)";

        if (stage === 1) {
            resTitle.innerText = "훈련 수료!";
            resDesc.innerText = `장비 획득을 완료했습니다.\n이제 본격적으로 몬스터 퇴치에 나섭니다!`;
            resBtn.innerText = "Stage 2 전투 진입";
            resBtn.onclick = () => { stage=2; initStage(); };
            showScene('result');
        } 
        else if (stage === 2) {
            resTitle.innerText = "몬스터 격파 성공!";
            resDesc.innerText = "드디어 최종 보스가 나타났습니다!\n보스는 정답률 90%를 넘겨야만 쓰러집니다.";
            resBtn.innerText = "Stage 3 최종 보스전";
            resBtn.onclick = () => { stage=3; initStage(); };
            showScene('result');
        }
        else if (stage === 3) {
            if (correctCount >= 27) { // 90%
                showEnding();
            } else {
                document.getElementById('monster-char').classList.add('anim-enrage');
                setTimeout(() => {
                    resTitle.innerText = "보스 레이드 실패!";
                    resTitle.style.color = "var(--hp-red)";
                    resDesc.innerText = `정답 개수: ${correctCount}/30 (90% 미만)\n보스가 분노하여 공격했습니다. 다시 도전하세요!`;
                    resBtn.innerText = "보스전 다시 도전";
                    resBtn.onclick = () => { showScene('game'); initStage(); };
                    showScene('result');
                }, 1500);
            }
        }
    }

    // 9. 엔딩 및 랭킹 시스템
    async function showEnding() {
        document.getElementById('result-title').innerText = "🎉 대승리! 🎉";
        document.getElementById('result-desc').innerHTML = `관용표현 마스터가 되었습니다!<br>최종 점수: <span style="color:var(--accent); font-weight:bold; font-size:24px;">${player.score}점</span>`;
        document.getElementById('result-btn').innerText = "랭킹 등록 및 처음으로";
        
        // 버튼 클릭 시 랭킹 서버로 전송
        document.getElementById('result-btn').onclick = async () => {
            document.getElementById('result-btn').disabled = true;
            document.getElementById('result-btn').innerText = "기록 저장 중...";
            if (GAS_URL) {
                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ classNum: player.classNum, studentNum: player.studentNum, score: player.score })
                    });
                } catch(e) { console.error("기록 저장 실패"); }
            }
            location.reload();
        };
        showScene('result');
    }

    // 로그인 화면 진입 시 랭킹 로드
    async function loadInitialRankings() {
        const rankList = document.getElementById('login-ranking-list');
        if (GAS_URL) {
            try {
                const response = await fetch(`${GAS_URL}?action=getRanking`);
                const result = await response.json();
                rankList.innerHTML = '';
                if(result.status === 'success' && result.data.length > 0) {
                    result.data.forEach((r, idx) => {
                        rankList.innerHTML += `<div class="ranking-item"><span>${idx + 1}등. ${r.classNum}반 ${r.studentNum}번</span><span>${r.score}점</span></div>`;
                    });
                } else { rankList.innerHTML = '<div style="text-align:center; padding: 20px;">아직 기록이 없습니다. (1등에 도전하세요!)</div>'; }
            } catch (e) { rankList.innerHTML = '<div style="text-align:center; padding: 20px; color:#e74c3c;">서버와 연결할 수 없습니다.<br>(URL이나 권한을 확인하세요)</div>'; }
        } else {
            rankList.innerHTML = `
                <div class="ranking-item"><span>1등. 1반 26번</span><span>1400점</span></div>
                <div class="ranking-item"><span>2등. 3반 12번</span><span>1200점</span></div>
                <div style="text-align:center; padding: 10px; font-size:12px; color:#7f8c8d;">(GAS URL이 입력되지 않은 데모 상태입니다.)</div>
            `;
        }
    }
    loadInitialRankings();
</script>
</body>
</html>

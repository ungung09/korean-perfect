<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관용표현 마스터 RPG</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css');

        :root {
            --bg-color: #2c3e50;
            --container-bg: #ecf0f1;
            --primary: #3498db;
            --primary-dark: #2980b9;
            --accent: #e74c3c;
            --text-dark: #2c3e50;
            --border: 4px solid #34495e;
            --hud-bg: #fdf6e3;
            --hp-green: #2ecc71;
            --hp-red: #e74c3c;
            --ui-gray: #bdc3c7;
        }

        * { box-sizing: border-box; font-family: 'NeoDunggeunmo', 'DungGeunMo', sans-serif; user-select: none; }

        body {
            background-color: var(--bg-color); color: var(--text-dark);
            margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%; max-width: 600px; background: var(--container-bg);
            border: var(--border); border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; position: relative; min-height: 750px; display: flex; flex-direction: column;
        }

        .scene { display: none; flex-direction: column; padding: 20px; flex-grow: 1; animation: fadeIn 0.3s; }
        .scene.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 상단 UI (점수, 콤보, 인벤토리) */
        #top-bar {
            background: #34495e; color: white; padding: 10px 15px;
            display: none; flex-direction: column; gap: 8px; border-bottom: var(--border);
        }
        .stats-row { display: flex; justify-content: space-between; align-items: center; font-size: 16px; }
        .combo-text { color: #f1c40f; font-weight: bold; font-size: 18px; animation: pulse 0.5s infinite alternate; }
        
        #inventory-area { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #inventory { display: flex; gap: 8px; margin-bottom: 5px;}
        .item-slot {
            width: 40px; height: 40px; background: rgba(0,0,0,0.3); border: 2px solid #7f8c8d;
            border-radius: 6px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: transform 0.1s; position: relative;
        }
        .item-slot:hover { transform: scale(1.1); border-color: #f1c40f; background: rgba(255,255,255,0.2); }
        .item-slot svg { width: 30px; height: 30px; }

        /* 아이템 툴팁 (Hover 설명) */
        .item-slot[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            top: 130%; left: 50%;
            transform: translateX(-50%);
            background: rgba(44, 62, 80, 0.95);
            color: #f1c40f;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, top 0.2s;
            z-index: 1000;
            border: 2px solid #f39c12;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            line-height: 1.4;
        }
        .item-slot[data-tooltip]::before {
            content: '';
            position: absolute;
            top: 100%; left: 50%;
            transform: translateX(-50%);
            border-width: 8px;
            border-style: solid;
            border-color: transparent transparent #f39c12 transparent;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
        .item-slot[data-tooltip]:hover::after { opacity: 1; top: 120%; }
        .item-slot[data-tooltip]:hover::before { opacity: 1; }
        
        #active-buffs { display: flex; gap: 10px; min-height: 18px; font-size: 12px; color: #00ffcc; }

        /* 로그인 & 캐릭터 선택 화면 */
        .title-box { text-align: center; margin-top: 10px; margin-bottom: 20px;}
        .title-box h1 { color: var(--primary-dark); text-shadow: 2px 2px 0 var(--ui-gray); font-size: 32px; margin: 0;}
        
        .char-select-container {
            display: flex; justify-content: space-around; background: white;
            border: var(--border); border-radius: 8px; padding: 15px 10px; margin-bottom: 15px;
        }
        .char-option {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            padding: 10px; border: 2px solid transparent; border-radius: 8px; opacity: 0.6; transition: all 0.2s;
        }
        .char-option.selected { border-color: var(--primary); opacity: 1; background: #e0f7fa; transform: scale(1.05); }
        .char-option svg { width: 60px; height: 60px; margin-bottom: 5px; }

        .login-wrapper { display: flex; gap: 15px; justify-content: center; align-items: stretch; flex-wrap: wrap; }
        .login-form-area, .login-ranking-area { flex: 1; min-width: 240px; background: white; border: var(--border); border-radius: 8px; padding: 15px; }
        .login-form { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 10px; font-size: 18px; border: 2px solid var(--ui-gray); border-radius: 5px; text-align: center; }
        
        .login-ranking-list { overflow-y: auto; max-height: 120px; font-size: 14px; margin-top: 10px;}
        .ranking-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed var(--ui-gray); }

        button {
            background: var(--btn-bg); border: 3px solid #7f8c8d; border-radius: 8px;
            padding: 12px; font-size: 16px; cursor: pointer;
            box-shadow: 0 4px 0 #7f8c8d; transition: all 0.1s; color: var(--text-dark); margin-bottom: 10px;
        }
        button:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 #7f8c8d; }
        button.action-btn { background: #f39c12; border-color: #d35400; box-shadow: 0 4px 0 #d35400; color: white; font-weight: bold;}
        button.action-btn:active { box-shadow: 0 0 0 #d35400; }
        button.wrong-btn { background: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b;}
        button.correct-btn { background: #2ecc71; color: white; border-color: #27ae60; box-shadow: 0 4px 0 #27ae60;}
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        /* 포켓몬 스타일 전투 영역 */
        .battle-area {
            flex-grow: 1; display: flex; flex-direction: column; position: relative;
            background: linear-gradient(to bottom, #74b9ff 0%, #a29bfe 100%);
            border: var(--border); border-radius: 8px; margin-bottom: 15px; overflow: hidden;
        }
        .battle-ground-top { position: absolute; top: 110px; right: 10px; width: 160px; height: 50px; background: #55efc4; border-radius: 50%; border: 3px solid #00b894; z-index: 1;}
        .battle-ground-bottom { position: absolute; bottom: 30px; left: 10px; width: 200px; height: 70px; background: #55efc4; border-radius: 50%; border: 3px solid #00b894; z-index: 1;}
        
        /* 몬스터 진영 (우측 상단) */
        .monster-station { position: absolute; top: 20px; right: 20px; z-index: 5; display: flex; flex-direction: column; align-items: center; }
        /* 애니메이션 충돌 방지를 위해 transition 제외 */
        .monster-sprite { width: 120px; height: 120px; filter: drop-shadow(0 5px 0 rgba(0,0,0,0.2)); }
        
        /* 몬스터 HUD (좌측 상단) */
        .hud-monster {
            position: absolute; top: 15px; left: 15px; width: 180px; background: var(--hud-bg);
            border: 3px solid #34495e; border-radius: 8px 0 8px 8px; padding: 8px; z-index: 10;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        /* 플레이어 진영 (좌측 하단) */
        .player-station { position: absolute; bottom: 30px; left: 30px; z-index: 5; display: flex; flex-direction: column; align-items: center; }
        .player-sprite { width: 140px; height: 140px; filter: drop-shadow(0 5px 0 rgba(0,0,0,0.3)); transform-origin: bottom center;}
        
        /* 플레이어 HUD (우측 하단) */
        .hud-player {
            position: absolute; bottom: 20px; right: 15px; width: 190px; background: var(--hud-bg);
            border: 3px solid #34495e; border-radius: 8px 0 8px 8px; padding: 8px; z-index: 10;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        /* HUD 내부 구성 */
        .hud-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: flex; justify-content: space-between;}
        .hp-bar-container { width: 100%; height: 10px; background: #2c3e50; border: 2px solid #7f8c8d; border-radius: 5px; position: relative; }
        .hp-bar { height: 100%; background: var(--hp-green); width: 100%; transition: width 0.3s, background-color 0.3s; }
        .hp-text { font-size: 12px; text-align: right; margin-top: 3px; font-weight: bold;}

        /* 애니메이션 이펙트 */
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        /* 역동적인 전투 애니메이션 */
        @keyframes attackPlayer { 
            0% { transform: scale(1) translate(0,0); } 
            50% { transform: scale(1.3) translate(60px, -60px); } 
            100% { transform: scale(1) translate(0,0); } 
        }
        @keyframes attackMonster { 
            0% { transform: translate(0,0); } 
            50% { transform: translate(-60px, 60px) scale(1.2); } 
            100% { transform: translate(0,0); } 
        }
        @keyframes shake { 
            0%, 100% { transform: translateX(0); filter: brightness(1); } 
            25% { transform: translateX(-10px) rotate(-5deg); filter: brightness(2) invert(1); } 
            75% { transform: translateX(10px) rotate(5deg); filter: brightness(2) invert(1); } 
        }
        @keyframes itemUse { 0% { transform: scale(0.5); opacity: 1; } 50% { transform: scale(2); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
        @keyframes pop { 0% { transform: scale(0.2); opacity: 1; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }

        .anim-float { animation: float 2s infinite ease-in-out; }
        .anim-atk-p { animation: attackPlayer 0.3s ease; }
        .anim-atk-m { animation: attackMonster 0.3s ease; }
        .anim-shake { animation: shake 0.4s ease; }

        /* 화면 중앙 이펙트 캔버스 */
        #effect-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; display: flex; justify-content: center; align-items: center;
        }
        .center-effect-icon { position: absolute; width: 100px; height: 100px; animation: itemUse 0.8s forwards; }

        /* 문제 영역 (대화창 스타일) */
        .question-box {
            background: white; border: var(--border); border-radius: 8px; padding: 15px;
            text-align: center; font-size: 18px; margin-bottom: 15px; min-height: 80px;
            display: flex; align-items: center; justify-content: center; line-height: 1.4;
            box-shadow: 0 4px 0 var(--ui-gray); border-radius: 8px; position: relative;
        }
        /* 대화창 꼬리표 */
        .question-box::before {
            content: ''; position: absolute; top: -15px; left: 40px;
            border-width: 0 10px 15px 10px; border-style: solid;
            border-color: transparent transparent var(--ui-gray) transparent;
        }
        .question-box::after {
            content: ''; position: absolute; top: -10px; left: 40px;
            border-width: 0 10px 15px 10px; border-style: solid;
            border-color: transparent transparent white transparent;
        }
        .highlight { color: var(--accent); font-weight: bold; font-size: 20px;}

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .effect-text {
            position: absolute; font-size: 28px; font-weight: bold; color: #ffeb3b;
            text-shadow: 2px 2px 0 #d32f2f, -2px -2px 0 #d32f2f, 2px -2px 0 #d32f2f, -2px 2px 0 #d32f2f;
            pointer-events: none; animation: floatUp 1s forwards; z-index: 200; text-align: center;
        }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-80px) scale(1.5); opacity: 0; } }

    </style>
</head>
<body>

<!-- SVG 에셋 (인라인) -->
<svg style="display:none;">
    <defs>
        <!-- 캐릭터: 전사 -->
        <g id="svg-warrior">
            <rect x="35" y="40" width="30" height="40" fill="#95a5a6" rx="5"/> <!-- 몸통 -->
            <rect x="40" y="80" width="8" height="15" fill="#7f8c8d"/><rect x="52" y="80" width="8" height="15" fill="#7f8c8d"/> <!-- 다리 -->
            <circle cx="50" cy="25" r="20" fill="#ecf0f1"/> <!-- 머리 -->
            <path d="M 30 25 Q 50 0 70 25 L 65 30 L 35 30 Z" fill="#bdc3c7"/> <!-- 투구 -->
            <rect x="45" y="5" width="10" height="20" fill="#e74c3c"/> <!-- 깃털 -->
            <circle cx="43" cy="25" r="3" fill="#2c3e50"/><circle cx="57" cy="25" r="3" fill="#2c3e50"/> <!-- 눈 -->
            <rect x="20" y="45" width="40" height="8" fill="#bdc3c7" transform="rotate(-45 30 45)"/> <!-- 검 -->
            <circle cx="70" cy="60" r="15" fill="#f39c12" stroke="#d35400" stroke-width="4"/> <!-- 방패 -->
        </g>
        <!-- 캐릭터: 마법사 -->
        <g id="svg-mage">
            <path d="M 30 90 L 40 40 L 60 40 L 70 90 Z" fill="#3498db"/> <!-- 망토 -->
            <circle cx="50" cy="30" r="18" fill="#f1c40f"/> <!-- 얼굴 -->
            <path d="M 20 30 L 50 0 L 80 30 Z" fill="#2980b9"/> <!-- 모자 -->
            <path d="M 15 30 L 85 30 L 80 35 L 20 35 Z" fill="#2980b9"/> <!-- 모자챙 -->
            <circle cx="43" cy="30" r="3" fill="#2c3e50"/><circle cx="57" cy="30" r="3" fill="#2c3e50"/> <!-- 눈 -->
            <rect x="75" y="30" width="6" height="50" fill="#8e44ad"/> <!-- 지팡이 -->
            <circle cx="78" cy="25" r="8" fill="#9b59b6"/> <!-- 지팡이 구슬 -->
        </g>
        <!-- 캐릭터: 궁수 -->
        <g id="svg-archer">
            <rect x="35" y="45" width="30" height="35" fill="#2ecc71" rx="5"/> <!-- 몸통 -->
            <rect x="40" y="80" width="8" height="15" fill="#8e44ad"/><rect x="52" y="80" width="8" height="15" fill="#8e44ad"/> <!-- 다리 -->
            <circle cx="50" cy="30" r="18" fill="#f39c12"/> <!-- 얼굴 -->
            <path d="M 30 35 Q 50 5 70 35 Q 50 15 30 35" fill="#27ae60"/> <!-- 후드 -->
            <circle cx="43" cy="30" r="3" fill="#2c3e50"/><circle cx="57" cy="30" r="3" fill="#2c3e50"/> <!-- 눈 -->
            <path d="M 25 40 Q 10 60 25 80" fill="none" stroke="#e67e22" stroke-width="4"/> <!-- 활 -->
            <line x1="25" y1="40" x2="25" y2="80" stroke="#ecf0f1" stroke-width="2"/> <!-- 활시위 -->
            <line x1="15" y1="60" x2="45" y2="60" stroke="#bdc3c7" stroke-width="3"/> <!-- 화살 -->
        </g>

        <!-- 몬스터 1: 슬라임 -->
        <g id="svg-slime">
            <path d="M 20 80 Q 50 10 80 80 Q 80 95 50 95 Q 20 95 20 80" fill="#1abc9c"/>
            <circle cx="40" cy="65" r="5" fill="#fff"/><circle cx="60" cy="65" r="5" fill="#fff"/>
            <circle cx="40" cy="65" r="2" fill="#000"/><circle cx="60" cy="65" r="2" fill="#000"/>
        </g>
        <!-- 몬스터 2: 오크 -->
        <g id="svg-orc">
            <circle cx="50" cy="40" r="30" fill="#27ae60"/>
            <rect x="25" y="70" width="50" height="30" fill="#c0392b" rx="10"/>
            <circle cx="35" cy="35" r="5" fill="#fff"/><circle cx="65" cy="35" r="5" fill="#fff"/>
            <circle cx="35" cy="35" r="2" fill="#e74c3c"/><circle cx="65" cy="35" r="2" fill="#e74c3c"/>
            <path d="M 40 55 Q 50 65 60 55" fill="none" stroke="#000" stroke-width="3"/>
            <path d="M 40 55 L 45 45 L 45 55 Z" fill="#fff"/><path d="M 60 55 L 55 45 L 55 55 Z" fill="#fff"/> <!-- 이빨 -->
            <rect x="80" y="20" width="10" height="70" fill="#7f8c8d" transform="rotate(20 85 55)"/> <!-- 몽둥이 -->
        </g>
        <!-- 몬스터 3: 드래곤 -->
        <g id="svg-dragon">
            <circle cx="50" cy="50" r="40" fill="#c0392b"/>
            <path d="M 10 50 Q -10 20 30 40 Z" fill="#e74c3c"/> <!-- 좌날개 -->
            <path d="M 90 50 Q 110 20 70 40 Z" fill="#e74c3c"/> <!-- 우날개 -->
            <circle cx="35" cy="40" r="8" fill="#f1c40f"/><circle cx="65" cy="40" r="8" fill="#f1c40f"/>
            <path d="M 40 70 Q 50 80 60 70" fill="none" stroke="#fff" stroke-width="4"/>
            <polygon points="35,15 45,25 25,25" fill="#f39c12"/>
            <polygon points="65,15 75,25 55,25" fill="#f39c12"/> <!-- 뿔 -->
        </g>
        
        <!-- 타격 이펙트 -->
        <g id="svg-hit">
            <path d="M 50 10 L 60 40 L 90 50 L 60 60 L 50 90 L 40 60 L 10 50 L 40 40 Z" fill="#e74c3c"/>
            <path d="M 50 20 L 55 45 L 80 50 L 55 55 L 50 80 L 45 55 L 20 50 L 45 45 Z" fill="#f1c40f"/>
        </g>

        <!-- 아이템들 -->
        <g id="item-hat"><path d="M 10 80 L 50 20 L 90 80 Z" fill="#8e44ad"/><path d="M 0 80 L 100 80 L 90 90 L 10 90 Z" fill="#8e44ad"/></g>
        <g id="item-sword"><rect x="45" y="10" width="10" height="60" fill="#bdc3c7"/><rect x="30" y="70" width="40" height="10" fill="#f1c40f"/><rect x="45" y="80" width="10" height="20" fill="#e67e22"/></g>
        <g id="item-shield"><path d="M 10 10 L 90 10 L 90 60 Q 50 100 10 60 Z" fill="#3498db" stroke="#f1c40f" stroke-width="5"/></g>
        <g id="item-armor"><rect x="20" y="20" width="60" height="70" fill="#2ecc71" rx="10"/><circle cx="50" cy="45" r="15" fill="#fff"/><path d="M 50 35 L 55 45 L 65 45 L 57 52 L 60 62 L 50 55 L 40 62 L 43 52 L 35 45 L 45 45 Z" fill="#f1c40f"/></g>
        <g id="item-wings"><path d="M 50 50 Q 10 10 10 50 Q 10 90 50 50" fill="#fff" opacity="0.8"/><path d="M 50 50 Q 90 10 90 50 Q 90 90 50 50" fill="#fff" opacity="0.8"/></g>
        <g id="item-wand"><rect x="45" y="20" width="10" height="70" fill="#8e44ad"/><polygon points="50,0 65,15 50,30 35,15" fill="#f1c40f"/></g>
        <g id="item-apple"><circle cx="50" cy="60" r="35" fill="#e74c3c"/><path d="M 50 25 Q 60 10 70 20" fill="none" stroke="#27ae60" stroke-width="8"/></g>
        <g id="item-bomb"><circle cx="50" cy="60" r="35" fill="#2c3e50"/><rect x="40" y="15" width="20" height="15" fill="#7f8c8d"/><path d="M 50 15 Q 60 0 70 10" fill="none" stroke="#e67e22" stroke-width="4"/></g>
        <g id="item-coin"><circle cx="50" cy="50" r="40" fill="#f1c40f"/><circle cx="50" cy="50" r="30" fill="none" stroke="#f39c12" stroke-width="4"/><text x="50" y="65" font-size="40" text-anchor="middle" fill="#d35400" font-weight="bold">$</text></g>
    </defs>
</svg>

<div id="game-container">
    
    <!-- 상단 상태바 -->
    <div id="top-bar">
        <div class="stats-row">
            <span id="stage-title">Stage 1</span>
            <span id="score-display">점수: 0</span>
            <span id="combo-display" class="combo-text">0 Combo!</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="inventory-area">
            <div id="inventory">
                <!-- 슬롯 5개 -->
                <div class="item-slot" id="slot-0" onclick="useItem(0)"></div>
                <div class="item-slot" id="slot-1" onclick="useItem(1)"></div>
                <div class="item-slot" id="slot-2" onclick="useItem(2)"></div>
                <div class="item-slot" id="slot-3" onclick="useItem(3)"></div>
                <div class="item-slot" id="slot-4" onclick="useItem(4)"></div>
            </div>
            <div id="active-buffs">아이템을 눌러 효과를 발동하세요!</div>
        </div>
    </div>

    <!-- 로그인 & 캐릭터 선택 화면 -->
    <div id="scene-login" class="scene active">
        <div class="title-box">
            <h1>관용표현<br>마스터 RPG</h1>
        </div>
        
        <h3 style="text-align:center; margin:0 0 10px 0; color:var(--text-dark);">나의 직업 선택</h3>
        <div class="char-select-container">
            <div class="char-option selected" onclick="selectChar(0)" id="char-opt-0">
                <svg viewBox="0 0 100 100"><use href="#svg-warrior"></use></svg>
                <span>전사</span>
            </div>
            <div class="char-option" onclick="selectChar(1)" id="char-opt-1">
                <svg viewBox="0 0 100 100"><use href="#svg-mage"></use></svg>
                <span>마법사</span>
            </div>
            <div class="char-option" onclick="selectChar(2)" id="char-opt-2">
                <svg viewBox="0 0 100 100"><use href="#svg-archer"></use></svg>
                <span>궁수</span>
            </div>
        </div>

        <div class="login-wrapper">
            <div class="login-form-area">
                <div class="login-form">
                    <input type="number" id="input-class" placeholder="몇 반? (숫자)" required>
                    <input type="number" id="input-number" placeholder="몇 번? (숫자)" required>
                    <button class="action-btn" onclick="startGame()">모험 시작!</button>
                </div>
            </div>
            
            <div class="login-ranking-area">
                <h3 style="margin-top: 0; text-align: center; color: var(--accent);">🏆 명예의 전당</h3>
                <div id="login-ranking-list" class="login-ranking-list">
                    <div style="text-align:center; padding: 10px;">랭킹 불러오는 중...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 로딩 화면 -->
    <div id="scene-loading" class="scene" style="justify-content: center; align-items: center;">
        <h2 class="anim-float" style="color: var(--primary-dark);">마법의 단어장<br>소환 중... 📖</h2>
    </div>

    <!-- 게임 포켓몬 전투 화면 -->
    <div id="scene-game" class="scene">
        <div class="battle-area" id="battle-area">
            <!-- 배경 타원 -->
            <div class="battle-ground-top"></div>
            <div class="battle-ground-bottom"></div>
            
            <!-- 이펙트 레이어 (중앙) -->
            <div id="effect-layer"></div>

            <!-- 몬스터 영역 (Top Right + Top Left HUD) -->
            <div class="hud-monster">
                <div class="hud-name"><span id="monster-name">슬라임</span><span>Lv.<span id="monster-lvl">1</span></span></div>
                <div class="hp-bar-container"><div class="hp-bar" id="monster-hp"></div></div>
                <div class="hp-text"><span id="monster-hp-txt">15</span> / <span id="monster-maxhp-txt">15</span></div>
            </div>
            <div class="monster-station">
                <svg class="monster-sprite anim-float" id="monster-sprite" viewBox="0 0 100 100">
                    <use href="#svg-slime"></use>
                </svg>
            </div>

            <!-- 플레이어 영역 (Bottom Left + Bottom Right HUD) -->
            <div class="player-station">
                <svg class="player-sprite" id="player-sprite" viewBox="0 0 100 100">
                    <use href="#svg-warrior"></use>
                </svg>
            </div>
            <div class="hud-player">
                <div class="hud-name"><span>내 캐릭터</span><span>HP</span></div>
                <div class="hp-bar-container"><div class="hp-bar" id="player-hp"></div></div>
                <div class="hp-text"><span id="player-hp-txt">5</span> / <span id="player-maxhp-txt">5</span></div>
            </div>
        </div>

        <div class="question-box" id="question-text">야생의 몬스터가 나타났다!</div>

        <div class="options-grid" id="options-area">
            <button onclick="checkAnswer(0)"></button>
            <button onclick="checkAnswer(1)"></button>
            <button onclick="checkAnswer(2)"></button>
            <button onclick="checkAnswer(3)"></button>
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="scene-result" class="scene" style="justify-content: center; align-items: center; text-align: center;">
        <h1 id="result-title" style="color: var(--primary-dark); font-size: 40px; margin-bottom: 10px;">결과</h1>
        <p id="result-desc" style="font-size: 18px; margin-bottom: 40px; line-height: 1.5;"></p>
        <button id="result-btn" class="action-btn" style="width: 80%; padding: 15px; font-size: 20px;" onclick="nextStage()">다음 스테이지</button>
    </div>

</div>

<script>
    // ==========================================
    // 앱스 스크립트 웹앱 URL 입력 (배포된 URL)
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzcltoLzFwrPO6xEjntBVAxRWwjg5485xQpvB7hkhm2LH09e5yLOd8KnxcmYBz_jeYqXw/exec"; 

    // 기본 데이터베이스 (Fallback)
    const fallbackData = [
        {id: 1, idiom: "눈이 번쩍 뜨이다", meaning: "정신이 갑자기 든다.", situation: "솔깃한 제안을 보았을 때"},
        {id: 2, idiom: "손발이 맞다", meaning: "마음이나 의견이 서로 맞다.", situation: "협동 게임을 할 때 팀원끼리 호흡이 척척 맞을 때"},
        {id: 3, idiom: "발이 넓다", meaning: "사귀어 아는 사람이 많다.", situation: "전교에 모르는 사람이 없을 때"},
        {id: 4, idiom: "꼬투리를 물고 늘어지다", meaning: "남의 말에서 꼬치꼬치 따지고 들다.", situation: "사소한 말실수 하나를 끝까지 비판할 때"},
        {id: 5, idiom: "김이 식다", meaning: "재미나 의욕이 없어지다.", situation: "기대했던 계획이 취소되었을 때"},
        {id: 6, idiom: "간 떨어지다", meaning: "매우 놀라다.", situation: "무서운 상황에 깜짝 놀랐을 때"},
        {id: 7, idiom: "손이 크다", meaning: "씀씀이가 후하고 크다.", situation: "음식을 만들 때 넉넉하게 챙길 때"},
        {id: 8, idiom: "마음은 굴뚝 같다", meaning: "하고 싶은 생각이 간절하다.", situation: "참여하고 싶지만 규칙 때문에 못해 아쉬울 때"},
        {id: 9, idiom: "날개를 얻은 듯", meaning: "매우 기쁘고 만족스러움.", situation: "자유시간을 얻어 날아갈 듯 기쁠 때"},
        {id: 10, idiom: "귀에 못이 박히다", meaning: "같은 말을 여러 번 반복해서 듣다.", situation: "잔소리를 너무 많이 들었을 때"}
    ];
    while(fallbackData.length < 40) { fallbackData.push({...fallbackData[Math.floor(Math.random()*10)], id: fallbackData.length+1}); }

    let allWords = [];
    
    // 아이템 SVG 레퍼런스 및 툴팁 정보
    const itemsInfo = {
        0: { id: 'hat', svg: '#item-hat', name: '지혜의 모자', desc: '3문제 동안 획득 점수 2배!' },
        1: { id: 'sword', svg: '#item-sword', name: '용기의 검', desc: '다음 정답 시 보스 데미지 2배!' },
        2: { id: 'shield', svg: '#item-shield', name: '인내의 방패', desc: '2문제 동안 오답 시 HP 방어!' },
        3: { id: 'armor', svg: '#item-armor', name: '치유의 갑옷', desc: '내 체력(HP) 2칸 즉시 회복!' },
        4: { id: 'wings', svg: '#item-wings', name: '요정의 날개', desc: '오답 보기 2개 즉시 제거!' },
        5: { id: 'wand', svg: '#item-wand', name: '마법 지팡이', desc: '현재 문제 즉시 정답 처리!' },
        6: { id: 'apple', svg: '#item-apple', name: '황금 사과', desc: '최대 체력 +1 및 전부 회복!' },
        7: { id: 'bomb', svg: '#item-bomb', name: '마법 폭탄', desc: '몬스터 체력 즉시 3칸 감소!' },
        8: { id: 'coin', svg: '#item-coin', name: '행운의 동전', desc: '보너스 100점 즉시 획득!' }
    };

    const charDefs = ['#svg-warrior', '#svg-mage', '#svg-archer'];
    
    // 게임 상태
    let player = {
        classNum: 0, studentNum: 0, score: 0, combo: 0,
        hp: 5, maxHp: 5,
        items: [],
        charIndex: 0
    };
    
    let activeBuffs = { scoreDouble: 0, doubleDamage: 0, shield: 0 };

    let stage = 1;
    let questions = [];
    let currentQ = 0;
    let currentOptionsIndices = [];
    
    // 몬스터 정보 (스테이지별) - 스테이지 3 드래곤 maxHp를 25에서 22로 변경
    const stageInfo = [
        {}, // 0인덱스 무시
        { name: '슬라임', lvl: 1, maxHp: 12, svg: '#svg-slime', qType: 'idiom_complete' }, // Stage 1
        { name: '오크', lvl: 5, maxHp: 20, svg: '#svg-orc', qType: 'meaning' }, // Stage 2
        { name: '보스 드래곤', lvl: 99, maxHp: 22, svg: '#svg-dragon', qType: 'situation' } // Stage 3
    ];
    let monster = { hp: 15, maxHp: 15, name: '', svg: '' };

    const scenes = {
        login: document.getElementById('scene-login'),
        loading: document.getElementById('scene-loading'),
        game: document.getElementById('scene-game'),
        result: document.getElementById('scene-result')
    };

    function selectChar(index) {
        player.charIndex = index;
        document.querySelectorAll('.char-option').forEach((el, i) => {
            el.classList.toggle('selected', i === index);
        });
    }

    function shuffle(array) {
        let cur = array.length, rnd;
        while (cur !== 0) { rnd = Math.floor(Math.random() * cur); cur--; [array[cur], array[rnd]] = [array[rnd], array[cur]]; }
        return array;
    }

    async function loadData() {
        if (!GAS_URL) { allWords = [...fallbackData]; return; }
        try {
            const response = await fetch(`${GAS_URL}?action=getWords`);
            const result = await response.json();
            if(result.status === 'success' && result.data.length > 0) { allWords = result.data; } 
            else { allWords = [...fallbackData]; }
        } catch (e) { allWords = [...fallbackData]; }
    }

    function showScene(sceneName) {
        Object.values(scenes).forEach(s => s.classList.remove('active'));
        scenes[sceneName].classList.add('active');
        document.getElementById('top-bar').style.display = (sceneName === 'game') ? 'flex' : 'none';
    }

    async function startGame() {
        const c = document.getElementById('input-class').value;
        const n = document.getElementById('input-number').value;
        if(!c || !n) { alert("반과 번호를 입력해주세요!"); return; }
        player.classNum = c; player.studentNum = n;
        
        showScene('loading');
        await loadData();
        stage = 1; 
        initStage();
    }

    function initStage() {
        // 문제 20문제로 세팅
        questions = shuffle([...allWords]).slice(0, 20);
        currentQ = 0; 
        player.combo = 0;
        
        // 스테이지 진입 시 체력을 100% 가득 채움
        player.hp = player.maxHp; 
        
        activeBuffs = { scoreDouble: 0, doubleDamage: 0, shield: 0 };

        document.getElementById('stage-title').innerText = `Stage ${stage} / 3`;
        
        // 몬스터 및 플레이어 세팅
        const mInfo = stageInfo[stage];
        monster.maxHp = mInfo.maxHp;
        monster.hp = mInfo.maxHp;
        monster.name = mInfo.name;
        monster.svg = mInfo.svg;
        
        document.getElementById('monster-name').innerText = monster.name;
        document.getElementById('monster-lvl').innerText = mInfo.lvl;
        document.getElementById('monster-sprite').innerHTML = `<use href="${monster.svg}"></use>`;
        document.getElementById('player-sprite').innerHTML = `<use href="${charDefs[player.charIndex]}"></use>`;

        updateUI();
        showScene('game');
        renderQuestion();
    }

    function splitIdiom(idiom) {
        const words = idiom.split(' ');
        if (words.length >= 2) return [words.slice(0, Math.ceil(words.length/2)).join(' '), words.slice(Math.ceil(words.length/2)).join(' ')];
        return [idiom.substring(0, Math.ceil(idiom.length/2)), idiom.substring(Math.ceil(idiom.length/2))];
    }

    function renderQuestion() {
        if (currentQ >= 20 || monster.hp <= 0) { handleStageClear(); return; }

        const q = questions[currentQ];
        const qType = stageInfo[stage].qType;
        let correctAnswer = "", displayQ = "";

        if (qType === 'idiom_complete') {
            const parts = splitIdiom(q.idiom);
            displayQ = `<span style="font-size:14px;color:#7f8c8d;">관용표현 완성하기</span><br><span class="highlight">"${parts[0]} [ ? ]"</span>`;
            correctAnswer = parts[1];
        } else if (qType === 'meaning') {
            displayQ = `<span style="font-size:14px;color:#7f8c8d;">뜻에 맞는 표현 고르기</span><br><span class="highlight">${q.meaning}</span>`;
            correctAnswer = q.idiom;
        } else {
            displayQ = `<span style="font-size:14px;color:#7f8c8d;">상황에 맞는 표현 고르기</span><br><span class="highlight">${q.situation}</span>`;
            correctAnswer = q.idiom;
        }

        document.getElementById('question-text').innerHTML = displayQ;

        let options = [correctAnswer];
        let wrongPool = shuffle(allWords.filter(w => w.id !== q.id));
        for (let i = 0; i < 3; i++) {
            options.push(qType === 'idiom_complete' ? splitIdiom(wrongPool[i].idiom)[1] : wrongPool[i].idiom);
        }

        options = shuffle(options);
        const btns = document.getElementById('options-area').getElementsByTagName('button');
        currentOptionsIndices = [];
        for (let i = 0; i < 4; i++) {
            btns[i].innerText = options[i];
            btns[i].className = '';
            btns[i].disabled = false;
            btns[i].style.visibility = 'visible'; 
            btns[i].dataset.correct = (options[i] === correctAnswer);
            
            if (btns[i].dataset.correct !== 'true') {
                currentOptionsIndices.push(i);
            }
        }

        document.getElementById('progress-bar').style.width = `${(currentQ / 20) * 100}%`;
    }

    // 타격(히트) 시각 이펙트
    function showHitEffect(targetId) {
        const target = document.getElementById(targetId);
        const rect = target.getBoundingClientRect();
        const hit = document.createElement('div');
        hit.style.position = 'absolute';
        hit.style.width = '80px';
        hit.style.height = '80px';
        hit.style.left = `${rect.left + rect.width/2 - 40}px`;
        hit.style.top = `${rect.top + rect.height/2 - 40}px`;
        hit.style.zIndex = 150;
        hit.style.pointerEvents = 'none';
        hit.innerHTML = `<svg viewBox="0 0 100 100" style="animation: pop 0.3s forwards"><use href="#svg-hit"></use></svg>`;
        document.body.appendChild(hit);
        setTimeout(() => hit.remove(), 300);
    }

    function checkAnswer(btnIndex) {
        const btns = document.getElementById('options-area').getElementsByTagName('button');
        for(let b of btns) b.disabled = true; 
        
        const btn = btns[btnIndex];
        const isCorrect = (btn.dataset.correct === 'true');

        if (isCorrect) {
            btn.className = 'correct-btn';
            player.combo++;
            
            // 점수 계산 (기본 10 + 콤보 보너스) * 아이템 배율
            let baseScore = 10 + (player.combo * 5);
            if (activeBuffs.scoreDouble > 0) { baseScore *= 2; }
            player.score += baseScore;
            showTextEffect(btn, `+${baseScore} (정답!)`, '#f1c40f');
            
            // 아이템 획득 (3콤보마다 확정, 그 외 20% 확률)
            if (player.combo % 3 === 0 || Math.random() < 0.2) { grantItem(); }
            
            // 내 공격 모션 시작
            playAnim('player-sprite', 'anim-atk-p');
            let dmg = 1;
            if (activeBuffs.doubleDamage > 0) { 
                dmg = 2; activeBuffs.doubleDamage = 0; 
            }
            
            // 모션의 타격 타이밍(150ms)에 맞추어 몬스터의 HP 감소 및 피격 이펙트 발생
            setTimeout(() => {
                showHitEffect('monster-sprite'); // 타격 이펙트
                monster.hp = Math.max(0, monster.hp - dmg);
                playAnim('monster-sprite', 'anim-shake'); // 흔들림 애니메이션
                updateUI();
                if (dmg === 2) showTextEffect(document.getElementById('monster-sprite'), "크리티컬!!", '#e74c3c');
            }, 150);

        } else {
            btn.className = 'wrong-btn';
            player.combo = 0; // 콤보 초기화
            for(let b of btns) { if(b.dataset.correct === 'true') b.className = 'correct-btn'; }

            // 몬스터 공격 모션 시작
            playAnim('monster-sprite', 'anim-atk-m');
            
            setTimeout(() => {
                if (activeBuffs.shield > 0) {
                    showTextEffect(document.getElementById('player-sprite'), "방어 성공!", '#3498db');
                } else {
                    // 패널티 로직
                    showHitEffect('player-sprite'); // 플레이어 피격 이펙트
                    player.score = Math.max(0, player.score - 10);
                    player.hp--;
                    playAnim('player-sprite', 'anim-shake'); // 흔들림 애니메이션
                    showTextEffect(document.getElementById('player-sprite'), "-10점 (오답)", '#e74c3c');
                }
                updateUI();
            }, 150);
        }

        // 버프 차감
        if (activeBuffs.scoreDouble > 0) activeBuffs.scoreDouble--;
        if (activeBuffs.shield > 0) activeBuffs.shield--;

        setTimeout(() => {
            if (player.hp <= 0) { handleGameOver(); }
            else { currentQ++; renderQuestion(); }
        }, 1200);
    }

    function grantItem() {
        if (player.items.length >= 5) return;
        const randomId = Math.floor(Math.random() * 9); 
        player.items.push(randomId);
        showTextEffect(document.getElementById('player-sprite'), "+아이템 획득!", '#2ecc71');
        updateUI();
    }

    // 아이템 효과 애니메이션 (가운데서 퍼짐)
    function showItemEffectVisual(svgRef) {
        const layer = document.getElementById('effect-layer');
        const icon = document.createElement('div');
        icon.className = 'center-effect-icon';
        icon.innerHTML = `<svg viewBox="0 0 100 100"><use href="${svgRef}"></use></svg>`;
        layer.appendChild(icon);
        setTimeout(() => icon.remove(), 800);
    }

    function useItem(slotIndex) {
        if (slotIndex >= player.items.length) return;
        const itemId = player.items[slotIndex];
        const item = itemsInfo[itemId];
        
        showItemEffectVisual(item.svg);

        switch(itemId) {
            case 0: activeBuffs.scoreDouble = 3; showTextEffect(document.getElementById('player-sprite'), "점수 2배 버프!"); break;
            case 1: activeBuffs.doubleDamage = 1; showTextEffect(document.getElementById('player-sprite'), "다음 공격력 2배!"); break;
            case 2: activeBuffs.shield = 2; showTextEffect(document.getElementById('player-sprite'), "보호막 전개!"); break;
            case 3: player.hp = Math.min(player.maxHp, player.hp + 2); showTextEffect(document.getElementById('player-sprite'), "HP 회복!"); break;
            case 4: 
                if (currentOptionsIndices.length >= 2) {
                    const btns = document.getElementById('options-area').getElementsByTagName('button');
                    let toHide = shuffle([...currentOptionsIndices]).slice(0, 2);
                    toHide.forEach(idx => {
                        btns[idx].style.visibility = 'hidden';
                    });
                    showTextEffect(document.getElementById('player-sprite'), "오답 제거!");
                } else {
                    showTextEffect(document.getElementById('player-sprite'), "이미 오답이 없습니다!");
                }
                break;
            case 5: 
                const btns = document.getElementById('options-area').getElementsByTagName('button');
                for(let i=0; i<4; i++) { if(btns[i].dataset.correct === 'true') { checkAnswer(i); break; } }
                break;
            case 6: player.maxHp++; player.hp = player.maxHp; showTextEffect(document.getElementById('player-sprite'), "최대 체력 증가!"); break;
            case 7: 
                monster.hp = Math.max(0, monster.hp - 3);
                playAnim('monster-sprite', 'anim-shake');
                showHitEffect('monster-sprite');
                showTextEffect(document.getElementById('monster-sprite'), "폭발 데미지!");
                break;
            case 8: player.score += 100; showTextEffect(document.getElementById('player-sprite'), "+100점 획득!"); break;
        }
        
        player.items.splice(slotIndex, 1);
        updateUI();
    }

    function updateUI() {
        document.getElementById('score-display').innerText = `점수: ${player.score}`;
        document.getElementById('combo-display').innerText = `${player.combo} Combo!`;
        document.getElementById('combo-display').style.display = player.combo > 1 ? 'block' : 'none';
        
        for(let i=0; i<5; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if (i < player.items.length) {
                const itemDef = itemsInfo[player.items[i]];
                slot.innerHTML = `<svg viewBox="0 0 100 100"><use href="${itemDef.svg}"></use></svg>`;
                slot.setAttribute('data-tooltip', `[${itemDef.name}] ${itemDef.desc}`);
            } else { 
                slot.innerHTML = ''; 
                slot.removeAttribute('data-tooltip');
            }
        }

        let buffTexts = [];
        if(activeBuffs.scoreDouble > 0) buffTexts.push(`점수2배(${activeBuffs.scoreDouble}턴)`);
        if(activeBuffs.doubleDamage > 0) buffTexts.push(`강공격 대기`);
        if(activeBuffs.shield > 0) buffTexts.push(`보호막(${activeBuffs.shield}턴)`);
        document.getElementById('active-buffs').innerText = buffTexts.length > 0 ? buffTexts.join(' | ') : "아이템을 눌러 효과 발동!";

        updateHPUI();
    }

    function updateHPUI() {
        const pBar = document.getElementById('player-hp');
        const mBar = document.getElementById('monster-hp');
        
        pBar.style.width = `${(player.hp / player.maxHp) * 100}%`;
        pBar.style.backgroundColor = (player.hp / player.maxHp) > 0.3 ? 'var(--hp-green)' : 'var(--hp-red)';
        document.getElementById('player-hp-txt').innerText = player.hp;
        document.getElementById('player-maxhp-txt').innerText = player.maxHp;

        mBar.style.width = `${(monster.hp / monster.maxHp) * 100}%`;
        mBar.style.backgroundColor = (monster.hp / monster.maxHp) > 0.3 ? 'var(--hp-green)' : 'var(--hp-red)';
        document.getElementById('monster-hp-txt').innerText = monster.hp;
        document.getElementById('monster-maxhp-txt').innerText = monster.maxHp;
    }

    function playAnim(elementId, animClass) {
        const el = document.getElementById(elementId);
        el.classList.remove(animClass);
        void el.offsetWidth; // 리플로우 강제 (애니메이션 재시작)
        el.classList.add(animClass);
    }

    function showTextEffect(el, text, color) {
        const rect = el.getBoundingClientRect();
        const effect = document.createElement('div');
        effect.className = 'effect-text';
        effect.innerText = text;
        effect.style.color = color;
        // HUD 및 요소들의 복잡한 배치로 인해 화면 중앙을 기준으로 상대적 보정 적용
        effect.style.left = `${rect.left + rect.width/2 - 50}px`;
        effect.style.top = `${rect.top}px`;
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 1000);
    }

    function handleGameOver() {
        document.getElementById('result-title').innerText = "전투 불능...";
        document.getElementById('result-title').style.color = "var(--hp-red)";
        document.getElementById('result-desc').innerText = "HP가 0이 되었습니다.\n걱정마세요! 다시 도전할 수 있습니다.";
        document.getElementById('result-btn').innerText = "스테이지 다시 도전";
        document.getElementById('result-btn').onclick = () => { showScene('game'); initStage(); };
        showScene('result');
    }

    function handleStageClear() {
        if (monster.hp > 0) {
            // 20문제를 다 풀었는데 몬스터가 안죽은 경우
            document.getElementById('result-title').innerText = "턴 종료!";
            document.getElementById('result-title').style.color = "var(--hp-red)";
            document.getElementById('result-desc').innerText = "20문제가 끝났지만 몬스터를 쓰러뜨리지 못했습니다!\n아이템을 적극적으로 활용하여 더 많은 데미지를 주세요.";
            document.getElementById('result-btn').innerText = "스테이지 다시 도전";
            document.getElementById('result-btn').onclick = () => { showScene('game'); initStage(); };
            showScene('result');
            return;
        }

        // 몬스터 처치 성공
        if (stage < 3) {
            document.getElementById('result-title').innerText = "몬스터 처치!";
            document.getElementById('result-title').style.color = "var(--primary-dark)";
            document.getElementById('result-desc').innerText = `성공적으로 ${monster.name}을(를) 물리쳤습니다!\n다음 몬스터에게 도전하세요.`;
            document.getElementById('result-btn').innerText = `Stage ${stage+1} 도전`;
            document.getElementById('result-btn').onclick = () => { stage++; initStage(); };
            showScene('result');
        } else {
            // 게임 클리어 (스테이지 3 보스 처치)
            showEnding();
        }
    }

    async function showEnding() {
        document.getElementById('result-title').innerText = "🎉 드래곤 처치 성공! 🎉";
        document.getElementById('result-desc').innerHTML = `마스터 칭호를 획득했습니다!<br>나의 콤보와 노력의 결실:<br><span style="color:var(--accent); font-weight:bold; font-size:30px;">${player.score}점</span>`;
        document.getElementById('result-btn').innerText = "랭킹 등록 및 처음으로";
        
        document.getElementById('result-btn').onclick = async () => {
            document.getElementById('result-btn').disabled = true;
            document.getElementById('result-btn').innerText = "기록 저장 중...";
            if (GAS_URL) {
                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ classNum: player.classNum, studentNum: player.studentNum, score: player.score })
                    });
                } catch(e) {}
            }
            location.reload();
        };
        showScene('result');
    }

    async function loadInitialRankings() {
        const rankList = document.getElementById('login-ranking-list');
        if (GAS_URL) {
            try {
                const response = await fetch(`${GAS_URL}?action=getRanking`);
                const result = await response.json();
                rankList.innerHTML = '';
                if(result.status === 'success' && result.data.length > 0) {
                    result.data.forEach((r, idx) => {
                        rankList.innerHTML += `<div class="ranking-item"><span>${idx + 1}등. ${r.classNum}반 ${r.studentNum}번</span><span>${r.score}점</span></div>`;
                    });
                } else { rankList.innerHTML = '<div style="text-align:center; padding: 10px;">아직 기록이 없습니다.</div>'; }
            } catch (e) { rankList.innerHTML = '<div style="text-align:center; padding: 10px; color:#e74c3c;">서버에 연결할 수 없습니다.</div>'; }
        } else {
            rankList.innerHTML = `
                <div class="ranking-item"><span>1등. 1반 26번</span><span>1400점</span></div>
                <div class="ranking-item"><span>2등. 3반 12번</span><span>1200점</span></div>
                <div style="text-align:center; padding: 5px; font-size:12px; color:#7f8c8d;">(데모 상태)</div>
            `;
        }
    }
    loadInitialRankings();
</script>
</body>
</html>
